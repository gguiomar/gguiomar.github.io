<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axiom Casino</title>
  <link rel="stylesheet" href="docs/terminal.css">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }
    .page-title {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 28px;
      color: #e6e6e6;
    }
    .hero-video {
      display: block;
      width: 100%;
      max-width: 640px;
      border-radius: 8px;
      border: 1px solid #1f1f1f;
    }
    .info {
      margin-top: 28px;
      color: #9a9a9a;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      line-height: 1.6;
    }
    .sound-btn {
      margin-top: 14px;
      padding: 6px 18px;
      background: transparent;
      border: 1px solid #333;
      border-radius: 999px;
      color: #9a9a9a;
      font-family: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .sound-btn:hover {
      border-color: #666;
      color: #e6e6e6;
    }
  </style>
</head>
<body>
<a class="corner-home" href="artworks.html">Home</a>
<div class="page-wrap">
  <h1 class="page-title">Axiom Casino</h1>
  <p class="info" style="margin: -18px 0 28px; font-size: 0.85rem; font-style: italic;"><a href="https://www.jonathanuliel.com/pt">Jonathan Uliel Saldanha</a> &amp; <a href="index.html">Gonçalo Guiomar</a></p>
  <video class="hero-video" id="vid" src="media/axiom_casino.mp4" autoplay loop muted playsinline></video>
  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">sound on</button>
  <p class="info">Theater Piece, Showing in Porto, 16–17 April 2026 — Portugal</p>
</div>
<script>
const v = document.getElementById('vid');
const b = document.getElementById('soundBtn');

function toggleSound() {
  v.muted = !v.muted;
  b.textContent = v.muted ? 'sound on' : 'sound off';
}

// Auto-unmute on first click anywhere
document.addEventListener('click', function unmute(e) {
  if (e.target === b) return;
  v.muted = false;
  b.textContent = 'sound off';
  document.removeEventListener('click', unmute);
}, { once: false });
</script>
</body>
</html>
